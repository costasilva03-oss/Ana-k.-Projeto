<!DOCTYPE html>
<html lang="Pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site1B</title>
    <style>
        header{
            background-color: #8a4349;
            color:black;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            border: 5px solid #660002;
            padding: 16px;
        }
        main{
            background-color: #FFFFFF;
            color: #660002;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }
        img{
            width: 90px;
            height: 70px;
        }
        .artigo-autor{
            font-weight: bold;
        }
        </style>
</head>
<body>
    <header>
        <h1>O peso de cada gota</h1>
        <p>"Pequenas atitudes contra o grande desperdício"</p>
    </header>
    <main>
        <img src="pngtree-water-wastage-symbol-drink-nature-picture-image_8201486.png" alt="água saindo de uma torneira de jardim">
        <div>
            <h2>Torneira aberta, futuro seco</h2>
            <p class="artigo-autor">Por: Ana Karoline, Hellane e Ester</p>
            <p>Boas-vindas ao Blog, aqui iremos saber sobre o conteúdo envolvendo essa água que nós desperdiçamos com mais frequência do que nós imaginamos</p>
            <button> ❤️<span>0</span></button>
            <button>👍<span>0</span></button>
        </div>
    </main>
</body>
<script>
    const botoes = document.querySelectorALL("button")

    botoes.forEach( function(botao){
        botao.addEventListener("click", botaoClicado)
        function botaoClicado(){
            console.log("fui clicado");
            let texto = botao.querySelector("span");
            texto.textContent++;
        }

    })
        

        

</script>
</html>
